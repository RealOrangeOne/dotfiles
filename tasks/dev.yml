- name: Install typesetting tooling
  kewlfft.aur.aur:
    name: "{{ item }}"
  become: true
  become_user: aur_builder
  loop:
    - pandoc-bin
    - typst

- name: Install dev packages
  kewlfft.aur.aur:
    name: "{{ item }}"
  become: true
  become_user: aur_builder
  loop:
    - ansible
    - arduino
    - arduino-cli
    - arduino-builder
    - docker
    - docker-compose
    - firefox-developer-edition
    - git-filter-repo
    - git-lfs
    - github-cli
    - hugo
    - just
    - lazygit
    - postgresql
    - sublime-text
    - zeal

- name: Add user to docker group
  user:
    name: "{{ user }}"
    groups: docker
    append: true
  become: true

- name: Create global .gitignore
  copy:
    src: ./files/gitignore_global
    dest: "{{ home }}/.config/.gitignore"
    mode: 0644
    owner: "{{ user }}"

- name: Install git config
  template:
    src: ./files/gitconfig.conf
    dest: "{{ home }}/.gitconfig"
    mode: 0644
    owner: "{{ user }}"
    group: users
